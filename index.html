<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mag Hex Generator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --pso-bg: #0a0e1a;
            --pso-panel: #0f1628;
            --pso-border: #1e3a5f;
            --pso-cyan: #00d4ff;
            --pso-cyan-dim: #007a99;
            --pso-gold: #f0a020;
            --pso-text: #c8e0f0;
            --pso-text-dim: #5a7a99;
            --pso-success-bg: #001a2e;
            --pso-success-border: #00d4ff;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--pso-bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0, 80, 150, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 220, 0.05) 0%, transparent 50%);
            color: var(--pso-text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .pso-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .pso-header {
            text-align: center;
            padding: 40px 0 30px;
            position: relative;
        }

        .pso-header::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--pso-cyan), transparent);
            margin-top: 20px;
            opacity: 0.5;
        }

        .pso-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--pso-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.4), 0 0 40px rgba(0, 212, 255, 0.15);
            margin: 0;
        }

        .pso-subtitle {
            font-size: 0.75rem;
            color: var(--pso-text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Panel / Card */
        .pso-panel {
            background: var(--pso-panel);
            border: 1px solid var(--pso-border);
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 20px;
            position: relative;
        }

        .pso-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--pso-cyan-dim), transparent);
            opacity: 0.6;
        }

        .pso-panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: var(--pso-cyan-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* Form controls */
        .form-label-pso {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--pso-text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .pso-select,
        .pso-input {
            background: rgba(0, 15, 40, 0.8) !important;
            border: 1px solid var(--pso-border) !important;
            border-radius: 3px !important;
            color: var(--pso-cyan) !important;
            font-family: 'Share Tech Mono', monospace !important;
            font-size: 0.95rem !important;
            padding: 10px 14px !important;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .pso-select:focus,
        .pso-input:focus {
            outline: none !important;
            border-color: var(--pso-cyan) !important;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.12) !important;
            background: rgba(0, 20, 50, 0.9) !important;
        }

        .pso-select option {
            background: #0a1428;
            color: var(--pso-text);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .stat-field {
            display: flex;
            flex-direction: column;
        }

        /* Stat badges */
        .stat-badge {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 2px;
            margin-bottom: 5px;
            width: fit-content;
        }

        .badge-def { background: rgba(80, 120, 200, 0.2); color: #6090e0; border: 1px solid #304070; }
        .badge-pow { background: rgba(200, 60, 60, 0.2); color: #e07060; border: 1px solid #702020; }
        .badge-dex { background: rgba(60, 180, 120, 0.2); color: #50c080; border: 1px solid #206040; }
        .badge-mind { background: rgba(150, 80, 200, 0.2); color: #b070e0; border: 1px solid #503070; }

        /* Generate button */
        .pso-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: transparent;
            color: var(--pso-cyan);
            border: 1px solid var(--pso-cyan);
            border-radius: 3px;
            padding: 12px 32px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .pso-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 16px rgba(0, 212, 255, 0.25), inset 0 0 16px rgba(0, 212, 255, 0.05);
            color: #fff;
        }

        .pso-btn:active {
            transform: scale(0.98);
        }

        /* Result area */
        .pso-result {
            display: none;
            background: var(--pso-success-bg);
            border: 1px solid var(--pso-success-border);
            border-radius: 4px;
            padding: 20px 24px;
            position: relative;
        }

        .pso-result::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--pso-cyan), transparent);
        }

        .result-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--pso-cyan-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .result-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: var(--pso-cyan);
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
            margin-bottom: 14px;
            word-break: break-all;
        }

        .result-value:last-child {
            margin-bottom: 0;
        }

        .hex-bytes {
            color: #fff;
        }

        /* Warning / Error */
        .pso-alert {
            display: none;
            border-radius: 3px;
            padding: 14px 18px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .pso-alert-warning {
            background: rgba(240, 160, 32, 0.1);
            border: 1px solid rgba(240, 160, 32, 0.4);
            color: var(--pso-gold);
        }

        .pso-alert-error {
            background: rgba(220, 50, 50, 0.1);
            border: 1px solid rgba(220, 50, 50, 0.4);
            color: #ff6060;
        }

        .pso-section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: var(--pso-text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* Divider */
        .pso-divider {
            border: none;
            border-top: 1px solid var(--pso-border);
            margin: 24px 0;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--pso-bg); }
        ::-webkit-scrollbar-thumb { background: var(--pso-border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="pso-container">
        <div class="pso-header">
            <h1 class="pso-title">Mag Hex Generator</h1>
            <p class="pso-subtitle">Phantasy Star Online &mdash; Item Code Tool</p>
        </div>

        <!-- Mag Selection -->
        <div class="pso-panel">
            <div class="pso-panel-title">// Select Mag</div>
            <label class="form-label-pso" for="mag">Mag Type</label>
            <select id="mag" class="pso-select">
                <!-- Options will be populated by JavaScript -->
            </select>
        </div>

        <!-- Stat Levels -->
        <div class="pso-panel">
            <div class="pso-panel-title">// Stat Levels</div>
            <div class="stat-grid">
                <div class="stat-field">
                    <span class="stat-badge badge-def">DEF</span>
                    <input type="text" id="def" class="pso-input" placeholder="0">
                </div>
                <div class="stat-field">
                    <span class="stat-badge badge-pow">POW</span>
                    <input type="text" id="pow" class="pso-input" placeholder="0">
                </div>
                <div class="stat-field">
                    <span class="stat-badge badge-dex">DEX</span>
                    <input type="text" id="dex" class="pso-input" placeholder="0">
                </div>
                <div class="stat-field">
                    <span class="stat-badge badge-mind">MIND</span>
                    <input type="text" id="mind" class="pso-input" placeholder="0">
                </div>
            </div>
        </div>

        <button onclick="generateHex()" class="pso-btn">Generate</button>

        <hr class="pso-divider">

        <!-- Messages -->
        <div class="pso-alert pso-alert-warning" id="warning-div">
            <span id="warningText"></span>
        </div>
        <div class="pso-alert pso-alert-error" id="error-div">
            <span id="errorText"></span>
        </div>

        <!-- Result -->
        <div class="pso-result" id="success-div">
            <div class="result-label">Item Code</div>
            <div class="result-value hex-bytes" id="itemCode"></div>
            <div class="result-label">Parameters</div>
            <div class="result-value hex-bytes" id="parameters"></div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="mag_hex_gen.js"></script>
    <script>
        function hideAllMessages() {
            document.getElementById("warning-div").style.display = 'none';
            document.getElementById("error-div").style.display = 'none';
            document.getElementById("success-div").style.display = 'none';
        }

        function displayError(message) {
            var errorDiv = document.getElementById("error-div");
            errorDiv.style.display = 'block';
            document.getElementById('errorText').innerText = message;
        }

        function displayWarning(message) {
            var warningDiv = document.getElementById("warning-div");
            warningDiv.style.display = 'block';
            document.getElementById('warningText').innerText = message;
        }

        function displaySuccess(itemCode, parameters) {
            var successDiv = document.getElementById("success-div");
            successDiv.style.display = 'block';
            document.getElementById('itemCode').innerText = itemCode;
            document.getElementById('parameters').innerText = parameters;
        }

        // Populate the dropdown with options from MAGS
        const magSelect = document.getElementById('mag');
        for (const mag of MAGS.flat()) {
            const [hexValue, name] = mag;
            const option = document.createElement('option');
            option.value = hexValue;
            option.textContent = `${hexValue} - ${name}`;
            magSelect.appendChild(option);
        }

        async function generateHex() {
            hideAllMessages();

            const mag = document.getElementById('mag').value.toUpperCase();
            const defLvl = parseInt(document.getElementById('def').value, 10);
            const powLvl = parseInt(document.getElementById('pow').value, 10);
            const dexLvl = parseInt(document.getElementById('dex').value, 10);
            const mindLvl = parseInt(document.getElementById('mind').value, 10);

            if (!MAGS.flat().some(item => item[0] === mag)) {
                displayError("The selected Mag hex value does not exist in the table");
                return;
            }
            
            const isError = Number.isNaN(defLvl) || Number.isNaN(powLvl) || Number.isNaN(dexLvl) || Number.isNaN(mindLvl);

            if (isError) {
                displayError("There was an error processing your input");
            } else {
                const statList = [defLvl, powLvl, dexLvl, mindLvl];
                const levels = defLvl + powLvl + dexLvl + mindLvl;

                if (levels > 200) {
                    displayWarning("Warning, level exceeds 200");
                }

                const bytesList = ['02', mag, toHex(levels), 'D9'];
                for (const stat of statList) {
                    const [expByte, lvlByte] = levelToHexBytes(stat);
                    bytesList.push(expByte);
                    bytesList.push(lvlByte);
                }

                displaySuccess(
                    "Item Code: " + bytesList.slice(0, 3).join(", "),
                    "Parameters: " + bytesList.slice(3).join(", ")
                );
            }
        }
    </script>
</body>
</html>
